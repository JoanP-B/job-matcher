version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: job_matcher_db
    environment:
      POSTGRES_USER: ${DB_USER:-jobmatcher}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secretpassword}
      POSTGRES_DB: ${DB_NAME:-jobmatcher_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jobmatcher} -d ${DB_NAME:-jobmatcher_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: job_matcher_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Bogota
    volumes:
      - n8n_data:/home/node/.n8n

  backend:
    build:
      context: ./backend
    container_name: job_matcher_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-jobmatcher}:${DB_PASSWORD:-secretpassword}@postgres:5432/${DB_NAME:-jobmatcher_db}
      - JWT_SECRET=${JWT_SECRET:-supersecretkey_for_jwt}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    image: nginx:alpine
    container_name: job_matcher_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  postgres_data:
  n8n_data:
